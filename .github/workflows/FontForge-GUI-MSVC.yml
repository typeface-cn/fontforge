name: Build FontForge-GUI with MSVC

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  windows-msvc-gui:
    runs-on: windows-latest
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-cache,readwrite"
      PYTHON_VERSION: '3.12'
      # 注意：CC/CXX 在 CMake 命令行中显式传递更可靠，但保留 env 供参考
      CC: cl.exe
      CXX: cl.exe
    
    steps:
      - name: Checkout FontForge source
        uses: actions/checkout@v4
        with:
          path: fontforge

      # 🔴 步骤 1: 克隆 libspiro (从 fontforge/libspiro)
      - name: Checkout libspiro
        uses: actions/checkout@v4
        with:
          repository: fontforge/libspiro
          path: libspiro
          ref: master # 或者指定具体的 commit/tag

      - name: Create vcpkg cache directory
        run: New-Item -ItemType Directory -Force -Path vcpkg-cache

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
          restore-keys: |
            vcpkg-files-${{ runner.os }}-

      # 🔴 步骤 2: 设置 MSVC 环境 (必须在编译前运行)
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'fontforge/vcpkg.json'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # 🔴 步骤 3: 构建 libspiro (修复版)
      # 关键点：显式指定 -G Ninja 和 -DCMAKE_BUILD_TYPE，并在同一脚本块中完成配置和构建
      - name: Build libspiro
        shell: pwsh
        run: |
          $libspiroSrc = "${{ github.workspace }}/libspiro"
          $libspiroBuild = "$libspiroSrc/build"
          $libspiroInstall = "${{ github.workspace }}/libspiro-install"
          
          Write-Host "Source: $libspiroSrc"
          Write-Host "Build Dir: $libspiroBuild"
          Write-Host "Install Dir: $libspiroInstall"
          
          # 创建构建目录
          New-Item -ItemType Directory -Force -Path $libspiroBuild | Out-Null
          
          # 配置 CMake
          # 必须指定 -G Ninja，否则在 Windows 上可能默认生成 VS 工程导致后续 build 命令失败
          cmake -S $libspiroSrc -B $libspiroBuild `
            -G "Ninja" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$libspiroInstall" `
            -DCMAKE_C_COMPILER=cl.exe `
            -DCMAKE_CXX_COMPILER=cl.exe
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "CMake configuration for libspiro failed!"
            exit 1
          }
          
          # 构建
          cmake --build $libspiroBuild --config Release
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Building libspiro failed!"
            exit 1
          }
          
          # 安装
          cmake --install $libspiroBuild --config Release
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Installing libspiro failed!"
            exit 1
          }
          
          Write-Host "libspiro built and installed successfully."
          
          # 验证安装结果
          if (Test-Path "$libspiroInstall/lib/libspiro.lib") {
            Write-Host "Found libspiro.lib"
          } else {
            Write-Warning "libspiro.lib not found in expected location. Checking bin..."
            Get-ChildItem -Recurse -Path $libspiroInstall -Filter "*.lib"
          }

      - name: Setup pkg-config and Env Vars
        shell: pwsh
        run: |
          $libspiroInstall = "${{ github.workspace }}/libspiro-install"
          $libspiroLib = "$libspiroInstall/lib"
          $libspiroInclude = "$libspiroInstall/include"
          $libspiroBin = "$libspiroInstall/bin"
          
          # 设置环境变量供后续步骤使用
          echo "LIBSPIRO_ROOT=$libspiroInstall" >> $env:GITHUB_ENV
          echo "LIBSPIRO_INCLUDE_DIR=$libspiroInclude" >> $env:GITHUB_ENV
          
          # 查找实际的 lib 文件名 (可能是 libspiro.lib 或 spiro.lib)
          $libFile = Get-ChildItem -Path $libspiroLib -Filter "*.lib" | Select-Object -First 1
          if ($libFile) {
            echo "LIBSPIRO_LIBRARY=$libspiroLib\$($libFile.Name)" >> $env:GITHUB_ENV
            Write-Host "Detected LIBSPIRO_LIBRARY: $libspiroLib\$($libFile.Name)"
          } else {
            Write-Error "No .lib file found in $libspiroLib"
            exit 1
          }
          
          # 设置 PKG_CONFIG_PATH
          $vcpkgPkgConfig = "$env:VCPKG_ROOT/installed/x64-windows/lib/pkgconfig;$env:VCPKG_ROOT/installed/x64-windows/share/pkgconfig"
          # 如果 libspiro 生成了 pkgconfig 文件则加入，否则只保留 vcpkg 的
          $pkgConfigPath = $vcpkgPkgConfig
          if (Test-Path "$libspiroLib/pkgconfig") {
            $pkgConfigPath = "$libspiroLib\pkgconfig;$pkgConfigPath"
          }
          echo "PKG_CONFIG_PATH=$pkgConfigPath" >> $env:GITHUB_ENV
          
          # 将 libspiro 的 bin 目录加入 PATH，以便找到 DLL
          echo "$libspiroBin" >> $env:GITHUB_PATH

      - name: Configure CMake (FontForge)
        shell: pwsh
        run: |
          cd fontforge
          $pythonExe = (Get-Command python).Source
          $libspiroRoot = $env:LIBSPIRO_ROOT
          $libspiroInc = $env:LIBSPIRO_INCLUDE_DIR
          $libspiroLib = $env:LIBSPIRO_LIBRARY

          Write-Host "Python: $pythonExe"
          Write-Host "VCPKG_ROOT: $env:VCPKG_ROOT"
          Write-Host "LIBSPIRO_ROOT: $libspiroRoot"
          Write-Host "LIBSPIRO_LIB: $libspiroLib"
          
          # 清理之前的构建以防万一
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
          
          cmake -B build `
            -G "Ninja" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl.exe `
            -DCMAKE_CXX_COMPILER=cl.exe `
            -DPython3_EXECUTABLE="$pythonExe" `
            -DENABLE_GUI=ON `
            -DENABLE_PYTHON_SCRIPTING=ON `
            -DENABLE_PYTHON_MODULE=ON `
            -DENABLE_LIBSPIRO=ON `
            -DLIBSPIRO_ROOT_DIR="$libspiroRoot" `
            -DLIBSPIRO_INCLUDE_DIR="$libspiroInc" `
            -DLIBSPIRO_LIBRARY="$libspiroLib" `
            -DENABLE_WOFF2=ON `
            -DENABLE_DOCS=OFF `
            -DENABLE_NLS=ON `
            -DBUILD_SHARED_LIBS=ON
            
          if ($LASTEXITCODE -ne 0) {
            Write-Error "CMake configuration for FontForge failed!"
            exit 1
          }

      - name: Build FontForge
        shell: pwsh
        run: |
          cd fontforge
          cmake --build build --config Release
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Building FontForge failed!"
            exit 1
          }

      - name: Setup embedded Python
        shell: pwsh
        run: |
          cd fontforge
          $embedUrl = "https://www.python.org/ftp/python/${{ env.PYTHON_VERSION }}.8/python-${{ env.PYTHON_VERSION }}.8-embed-amd64.zip"
          New-Item -ItemType Directory -Force -Path build/bin/Lib
          Invoke-WebRequest -Uri $embedUrl -OutFile python-embed.zip
          Expand-Archive -Path python-embed.zip -DestinationPath build/bin/Lib -Force
          Remove-Item -Path python-embed.zip -Force
          
          Move-Item -Path build/bin/Lib/python*.dll -Destination build/bin/ -Force -ErrorAction SilentlyContinue
          Move-Item -Path build/bin/Lib/python*.zip -Destination build/bin/ -Force -ErrorAction SilentlyContinue
          
          $pypath = "build/bin/Lib/python${{ env.PYTHON_VERSION }}._pth"
          if (Test-Path $pypath) {
            $content = Get-Content $pypath -Raw
            $content = $content -replace '^#import site', 'import site'
            Set-Content -Path $pypath -Value $content -NoNewline
          }

      - name: Copy runtime dependencies
        shell: pwsh
        run: |
          cd fontforge
          $vcpkgBin = "build\vcpkg_installed\x64-windows\bin"
          $targetBin = "build\bin"
          $libspiroInstall = "${{ github.workspace }}/libspiro-install"
          $libspiroBin = "$libspiroInstall\bin"
          
          $guiDlls = @(
            "gtk-3-0.dll", "gdk-3-0.dll", "gdk_pixbuf-2.0-0.dll",
            "pango-1.0-0.dll", "pangocairo-1.0-0.dll", "pangowin32-1.0-0.dll",
            "cairo-2.dll", "cairo-gobject-2.dll",
            "glib-2.0-0.dll", "gobject-2.0-0.dll", "gio-2.0-0.dll",
            "gmodule-2.0-0.dll", "gthread-2.0-0.dll", "intl.dll",
            "libffi-8.dll", "libpng16-16.dll", "libjpeg-8.dll",
            "libtiff-5.dll", "libwebp-7.dll", "freetype-6.dll",
            "fontconfig-1.dll", "expat.dll", "zlib1.dll",
            "libiconv-2.dll", "libxml2-2.dll", "libxslt-1.dll",
            "harfbuzz-0.dll", "pangoft2-1.0-0.dll", "epoxy-0.dll",
            "atk-1.0-0.dll"
          )
          
          foreach ($dll in $guiDlls) {
            $source = "$vcpkgBin\$dll"
            if (Test-Path $source) {
              Copy-Item -Path $source -Destination "$targetBin\" -Force
            }
          }
          
          # 复制 libspiro DLL (通常在 bin 目录下，名字可能是 libspiro-0.dll 或类似)
          if (Test-Path $libspiroBin) {
            Get-ChildItem -Path $libspiroBin -Filter "*.dll" | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination "$targetBin\" -Force
              Write-Host "Copied libspiro DLL: $($_.Name)"
            }
          } else {
            Write-Warning "libspiro bin directory not found: $libspiroBin"
          }
          
          Copy-Item "$vcpkgBin\..\share\themes\*" -Destination "$targetBin\share\themes\" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item "$vcpkgBin\..\share\icons\*" -Destination "$targetBin\share\icons\" -Recurse -Force -ErrorAction SilentlyContinue
          
          New-Item -ItemType Directory -Force -Path "$targetBin\etc\gtk-3.0" | Out-Null
          @"
          [Settings]
          gtk-theme-name=win32
          gtk-icon-theme-name=Adwaita
          gtk-font-name=Segoe UI 9
          "@ | Out-File -FilePath "$targetBin\etc\gtk-3.0\settings.ini" -Encoding UTF8

      - name: Create launch script
        shell: pwsh
        run: |
          cd fontforge/build/bin
          @"
          @echo off
          setlocal
          set FONTFORGE_HOME=%~dp0
          set PATH=%FONTFORGE_HOME%;%PATH%
          set PYTHONHOME=%FONTFORGE_HOME%
          set PYTHONPATH=%FONTFORGE_HOME%Lib;%FONTFORGE_HOME%
          "%FONTFORGE_HOME%fontforge.exe" %*
          "@ | Out-File -FilePath "fontforge-launcher.bat" -Encoding ASCII

      - name: Upload FontForge Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FontForge-Windows-MSVC-GUI-NLS-Build
          path: |
            fontforge/build/bin/
            fontforge/build/share/
            fontforge/build/etc/
          if-no-files-found: error
          retention-days: 30

      - name: Save vcpkg binary cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: vcpkg-cache
          key: vcpkg-files-${{ runner.os }}-${{ hashFiles('fontforge/vcpkg.json') }}
